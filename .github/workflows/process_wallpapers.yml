name: Otomatisasi Konversi Gambar dan Generate JSON

on:
  push:
    paths:
      - 'wallpapers/**' # Berjalan hanya jika ada perubahan di folder wallpapers
  workflow_dispatch: # Memungkinkan Anda menjalankan ini secara manual dari web GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout kode dari repositori
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Python untuk menjalankan skrip generator
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-state: '3.x'

    # 3. Konversi gambar JPG/PNG ke WEBP otomatis
    - name: Konversi JPG/PNG ke WEBP
      uses: calibreapp/image-actions@main
      with:
        githubToken: ${{ secrets.GITHUB_TOKEN }}
        # Mengonversi gambar di folder wallpapers, kualitas 80% (seimbang antara jernih dan hemat size)
        options: -q 80
        ignorePaths: 'node_modules/**'

    # 4. Tambahan: Jika Anda ingin konversi manual via tool bawaan Ubuntu (WebP cwebp)
    - name: Install WebP Tool & Konversi
      run: |
        sudo apt-get install webp
        cd wallpapers
        for file in *.{jpg,jpeg,png,JPG,JPEG,PNG}; do
          if [ -f "$file" ]; then
            filename="${file%.*}"
            cwebp -q 80 "$file" -o "${filename}.webp"
            rm "$file" # Menghapus file asli agar hemat ruang penyimpanan repo
          fi
        done
        cd ..

    # 5. Jalankan skrip Python untuk memperbarui file JSON
    - name: Generate Wallpapers JSON
      run: python scripts/generate_json.py

    # 6. Commit dan Push kembali perubahan ke Github
    - name: Commit dan Push Perubahan
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add wallpapers/*.webp wallpapers.json
        # Hanya commit jika ada perubahan baru agar tidak error
        git diff --quiet && git diff --staged --quiet || git commit -m "Otomatis: Konversi ke webp dan update wallpapers.json [skip ci]"
        git push
